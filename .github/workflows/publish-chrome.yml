name: Publish Chrome Extension

# Triggered manually or on push to main.
# Skips the publish step automatically if Chrome Web Store secrets are not configured.
# Required secrets (set in GitHub → Settings → Secrets → Actions):
#   CHROME_EXTENSION_CLIENT_ID      — OAuth2 client ID from Google Cloud Console
#   CHROME_EXTENSION_CLIENT_SECRET  — OAuth2 client secret from Google Cloud Console
#   CHROME_EXTENSION_REFRESH_TOKEN  — OAuth2 refresh token (see docs/CHROME_STORE_SETUP.md)
#   CHROME_EXTENSION_ID             — Extension ID from Chrome Web Store developer dashboard
#
# See docs/CHROME_STORE_SETUP.md for step-by-step setup instructions.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-secrets:
    name: Check Chrome Store Secrets
    runs-on: ubuntu-latest
    outputs:
      secrets_configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Detect if Chrome Web Store secrets are configured
        id: check
        env:
          CLIENT_ID: ${{ secrets.CHROME_EXTENSION_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_EXTENSION_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_EXTENSION_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          if [[ -n "$CLIENT_ID" && -n "$CLIENT_SECRET" && -n "$REFRESH_TOKEN" && -n "$EXTENSION_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✅ All Chrome Web Store secrets are configured — publish will run."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  One or more Chrome Web Store secrets are missing — publish step will be skipped."
            echo "   Set CHROME_EXTENSION_CLIENT_ID, CHROME_EXTENSION_CLIENT_SECRET,"
            echo "   CHROME_EXTENSION_REFRESH_TOKEN, and CHROME_EXTENSION_ID in GitHub secrets."
            echo "   See docs/CHROME_STORE_SETUP.md for instructions."
          fi

  build-and-package:
    name: Build and Package
    runs-on: ubuntu-latest
    needs: check-secrets
    outputs:
      zip_path: ${{ steps.package.outputs.zip_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build extension
        run: yarn build:chromium

      - name: Create zip artifact
        id: package
        run: |
          set -euo pipefail
          cd dist/chromium
          zip -r ../../chrome-extension.zip .
          cd ../..
          echo "zip_path=chrome-extension.zip" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-package
          path: chrome-extension.zip

  publish:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: [check-secrets, build-and-package]
    if: ${{ needs.check-secrets.outputs.secrets_configured == 'true' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-package

      - name: Publish package to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: publish
          client_id: ${{ secrets.CHROME_EXTENSION_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_EXTENSION_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_EXTENSION_REFRESH_TOKEN }}
          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
          zip_file: chrome-extension.zip

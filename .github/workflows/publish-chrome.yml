name: Publish Chrome Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-package:
    name: Build and Package
    runs-on: ubuntu-latest
    outputs:
      zip_path: ${{ steps.package.outputs.zip_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found. Cannot publish yet."
            exit 1
          fi

      - name: Build extension
        run: |
          if npm run | grep -q " build:chrome"; then
            npm run build:chrome
          elif npm run | grep -q " build"; then
            npm run build
          else
            echo "No build script found."
            exit 1
          fi

      - name: Create zip artifact
        id: package
        run: |
          set -euo pipefail
          if [ -d dist/chrome ]; then
            cd dist/chrome
          elif [ -d dist ]; then
            cd dist
          else
            echo "Build output directory not found (expected dist/chrome or dist)."
            exit 1
          fi
          zip -r ../../chrome-extension.zip .
          cd ../..
          echo "zip_path=chrome-extension.zip" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-package
          path: chrome-extension.zip

  publish:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: build-and-package
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-package

      - name: Publish package to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: publish
          client_id: ${{ secrets.CHROME_EXTENSION_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_EXTENSION_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_EXTENSION_REFRESH_TOKEN }}
          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
          zip_file: chrome-extension.zip

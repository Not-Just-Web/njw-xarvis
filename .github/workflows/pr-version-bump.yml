name: PR Version Bump

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Check if version bump needed
        id: check
        run: |
          set -euo pipefail

          # Fetch main branch (minimal)
          git fetch origin main --depth=1

          # Get versions
          main_version=$(git show origin/main:package.json | jq -r '.version')
          pr_version=$(jq -r '.version' package.json)

          echo "main_version=${main_version}" >> "$GITHUB_OUTPUT"
          echo "pr_version=${pr_version}" >> "$GITHUB_OUTPUT"

          # Version comparison logic
          compare_versions() {
            local v1=$1 v2=$2
            if [[ $v1 == "$v2" ]]; then echo 0; return; fi
            local IFS=.
            local i ver1=($v1) ver2=($v2)
            for ((i=0; i<${#ver1[@]}; i++)); do
              if [[ -z ${ver2[i]} ]]; then echo 1; return; fi
              if ((10#${ver1[i]} > 10#${ver2[i]})); then echo 1; return; fi
              if ((10#${ver1[i]} < 10#${ver2[i]})); then echo -1; return; fi
            done
            echo 0
          }

          cmp=$(compare_versions "$pr_version" "$main_version")
          echo "Version comparison: PR(${pr_version}) vs main(${main_version}) => ${cmp}"

          if [ "${cmp}" -eq 1 ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable Corepack
        if: steps.check.outputs.needed == 'true'
        run: corepack enable

      - name: Setup Node
        if: steps.check.outputs.needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        if: steps.check.outputs.needed == 'true'
        run: yarn install

      - name: Compute and bump version
        if: steps.check.outputs.needed == 'true'
        id: bump
        run: |
          set -euo pipefail

          main_version="${{ steps.check.outputs.main_version }}"
          pr_version="${{ steps.check.outputs.pr_version }}"

          # Parse versions into components
          parse_version() {
            local version=$1
            IFS='.' read -r major minor patch <<< "$version"
            echo "${major} ${minor} ${patch}"
          }

          # Compare versions
          compare_versions() {
            local v1=$1 v2=$2
            if [[ $v1 == "$v2" ]]; then echo 0; return; fi
            local IFS=.
            local i ver1=($v1) ver2=($v2)
            for ((i=0; i<${#ver1[@]}; i++)); do
              if [[ -z ${ver2[i]} ]]; then echo 1; return; fi
              if ((10#${ver1[i]} > 10#${ver2[i]})); then echo 1; return; fi
              if ((10#${ver1[i]} < 10#${ver2[i]})); then echo -1; return; fi
            done
            echo 0
          }

          cmp=$(compare_versions "$pr_version" "$main_version")

          # Calculate next version
          read -r maj min patch <<< "$(parse_version "$main_version")"

          if [ "${cmp}" -eq -1 ]; then
            # PR behind main: bump to be > main
            if [ "${patch}" -lt 9 ]; then
              patch=$((patch + 1))
            else
              min=$((min + 1))
              patch=0
            fi
          else
            # PR == main: increment patch
            if [ "${patch}" -lt 9 ]; then
              patch=$((patch + 1))
            else
              min=$((min + 1))
              patch=0
            fi
          fi

          next_version="${maj}.${min}.${patch}"
          echo "Bumping from ${pr_version} to ${next_version}"

          echo "current_version=${pr_version}" >> "$GITHUB_OUTPUT"
          echo "new_version=${next_version}" >> "$GITHUB_OUTPUT"

          tmp=$(mktemp)
          jq --arg v "${next_version}" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json
          git commit -m "[chore] bump version to ${next_version} for PR #${{ github.event.pull_request.number }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Update PR body with version bump
        if: steps.check.outputs.needed == 'true' && steps.bump.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const markerStart = '<!-- version-bump:start -->';
            const markerEnd = '<!-- version-bump:end -->';
            const block = `${markerStart}\n## Version Bump\n- Root package version updated automatically to \`${{ steps.bump.outputs.new_version }}\`\n- Rule: patch increments until 9, then minor increments and patch resets to 0\n${markerEnd}`;

            const body = pr.body || '';
            const hasMarkers = body.includes(markerStart) && body.includes(markerEnd);
            const newBody = hasMarkers
              ? body.replace(new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`), block)
              : `${body}\n\n${block}`.trim();

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: newBody
            });

      - name: Add or update PR comment
        if: steps.check.outputs.needed == 'true' && steps.bump.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const marker = '<!-- version-bump-comment -->';
            const message = `${marker}\nVersion updated automatically in this PR:\n- Previous: \`${{ steps.bump.outputs.current_version }}\`\n- New: \`${{ steps.bump.outputs.new_version }}\`\n\nThis version will be used directly by the release workflow after merge.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100
            });

            const existing = comments.find(
              c => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: message
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message
              });
            }

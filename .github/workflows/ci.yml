name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install && cd connector-api && npm install

      - name: Typecheck (extension + connector-api)
        run: yarn typecheck:all

      - name: Lint (extension + connector-api)
        run: yarn lint:all

      - name: Test (extension only)
        run: yarn test

      - name: Build (extension + connector-api)
        run: yarn build && cd connector-api && npm run build

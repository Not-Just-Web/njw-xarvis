name: Create Release

# Auto-creates release artifacts (chromium + firefox zips) when merged to main
# Trigger: Automatic on pushes to main (manual option still available via workflow_dispatch)
# Validates: typecheck, lint, test before building
# Creates: Release with version from package.json (skips if already exists)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies (root + connector-api)
        run: yarn install

      - name: Type check (extension + connector-api)
        run: yarn typecheck:all

      - name: Lint (extension + connector-api)
        run: yarn lint:all

      - name: Run tests (extension only)
        run: yarn test

      - name: Build Chromium extension
        run: yarn build:chromium

      - name: Build Firefox extension
        run: yarn build:firefox

      - name: Build Connector API
        run: yarn build:api

      - name: Create Chromium zip
        run: |
          cd dist/chromium
          zip -r ../../njw-xarvis-chromium.zip .
          cd ../..

      - name: Create Firefox zip
        run: |
          cd dist/firefox
          zip -r ../../njw-xarvis-firefox.zip .
          cd ../..

      - name: Create packed Chromium tarball
        run: |
          cd dist/chromium
          tar -czf ../../njw-xarvis-chromium-packed.tar.gz .
          cd ../..

      - name: Create packed Firefox tarball
        run: |
          cd dist/firefox
          tar -czf ../../njw-xarvis-firefox-packed.tar.gz .
          cd ../..

      - name: Create Firefox XPI
        run: |
          cd dist/firefox
          zip -r ../../njw-xarvis-firefox.xpi .
          cd ../..

      - name: Create Chromium CRX
        if: secrets.CHROME_CRX_PRIVATE_KEY != ''
        run: |
          mkdir -p .release
          # Decode the base64-encoded private key from GitHub secret
          echo "${{ secrets.CHROME_CRX_PRIVATE_KEY }}" | base64 -d > .release/chrome-extension-key.pem
          echo "Using CHROME_CRX_PRIVATE_KEY secret for CRX signing"
          # Generate CRX using crx3
          npx crx3 dist/chromium --keyPath .release/chrome-extension-key.pem --crxPath njw-xarvis-chromium.crx
          # Clean up key
          rm .release/chrome-extension-key.pem

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check_release
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release and Upload Assets
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.version }}"
          files: |
            njw-xarvis-chromium.zip
            njw-xarvis-firefox.zip
            njw-xarvis-chromium-packed.tar.gz
            njw-xarvis-firefox-packed.tar.gz
            njw-xarvis-chromium.crx
            njw-xarvis-firefox.xpi
          body: |
            ## 🚀 NJW Xarvis v${{ steps.version.outputs.version }}

            ### 📦 Available Downloads

            - **Chromium** (Chrome, Brave, Edge): `njw-xarvis-chromium.zip` or `njw-xarvis-chromium.crx`
            - **Firefox Single File**: `njw-xarvis-firefox.xpi`
            - **Firefox Zip**: `njw-xarvis-firefox.zip`
            - **Chromium Packed**: `njw-xarvis-chromium-packed.tar.gz`
            - **Firefox Packed**: `njw-xarvis-firefox-packed.tar.gz`

            > **Note**: `.crx` file is available when `CHROME_CRX_PRIVATE_KEY` secret is configured.

            ### 📥 Installation Instructions

            #### Chrome / Brave / Edge - Option A: Direct Install (Signed CRX)
            1. Download `njw-xarvis-chromium.crx`
            2. Open `chrome://extensions/` (or `brave://extensions/`, `edge://extensions/`)
            3. Drag and drop the `.crx` file into the page
            4. Click "Add extension"

            #### Chrome / Brave / Edge - Option B: Developer Mode (Zip)
            1. Download `njw-xarvis-chromium.zip` and extract it
            2. Go to `chrome://extensions/` (or `brave://extensions/`, `edge://extensions/`)
            3. Enable "Developer mode" (top right)
            4. Click "Load unpacked"
            5. Select the extracted folder

            #### Firefox - Direct Install (Single File)
            1. Download `njw-xarvis-firefox.xpi`
            2. Open Firefox and go to `about:debugging#/runtime/this-firefox`
            3. Click "Load Temporary Add-on" (or drag-drop the .xpi file onto Firefox)
            4. Select the `.xpi` file

            > **Recommended**: Use `.crx` for Chrome (easiest) and `.xpi` for Firefox (true single-file install)

            ### ✨ Features
            - 🤖 Multi-provider AI support (Gemini, Claude, ChatGPT)
            - 💬 Persistent chat sessions with context timeline
            - 📸 Capture browser context (URL, screenshot, element)
            - ⚡ Quick access via right-click context menu
            - 🎯 Drag-drop image support
            - 📝 Markdown rendering

            ---
            Built with React + TypeScript + Vite
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

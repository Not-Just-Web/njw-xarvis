name: PR Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails:
    name: PR Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR source is not main
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if [ "${{ github.head_ref }}" = "main" ]; then
            echo "PRs must come from a feature branch, not main."
            exit 1
          fi
      - name: Require phase tag in PR title
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          title="${{ github.event.pull_request.title }}"
          echo "PR title: $title"
          echo "$title" | grep -E '\[(phase-[0-9]+|infra|docs|fix)\]' >/dev/null || {
            echo "PR title must include one tag: [phase-0], [phase-1], [infra], [docs], [fix]"
            exit 1
          }

  validate:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build


      - name: Build (if script exists)
        run: |
          if [ -f package.json ] && npm run | grep -q " build"; then
            npm run build
          else
            echo "No build script found."
          fi

<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#ECF1F7"/>
  <text x="16" y="20" fill="#475569" font-size="12" font-family="Arial, sans-serif">Wireframe: Context Capture inside AI Sidepanel</text>

  <rect x="24" y="24" width="1232" height="672" rx="14" fill="#FFFFFF" stroke="#D1D5DB"/>
  <rect x="24" y="24" width="1232" height="42" rx="14" fill="#F3F4F6"/>
  <circle cx="46" cy="45" r="6" fill="#F87171"/>
  <circle cx="68" cy="45" r="6" fill="#FBBF24"/>
  <circle cx="90" cy="45" r="6" fill="#34D399"/>
  <rect x="120" y="35" width="720" height="20" rx="6" fill="#E5E7EB"/>

  <!-- Left browser tab content (unaffected) -->
  <rect x="40" y="78" width="850" height="602" fill="#F8FAFC"/>
  <rect x="56" y="98" width="360" height="20" rx="4" fill="#CBD5E1"/>
  <rect x="56" y="128" width="780" height="12" rx="4" fill="#E2E8F0"/>
  <rect x="56" y="146" width="720" height="12" rx="4" fill="#E2E8F0"/>
  <rect x="56" y="176" width="780" height="220" rx="10" fill="#EAF2FF"/>
  <rect x="56" y="412" width="780" height="220" rx="10" fill="#F1F5F9"/>

  <!-- Right AI assistant panel -->
  <rect x="890" y="78" width="350" height="602" fill="#F7F8FA" stroke="#E5E7EB"/>
  <rect x="890" y="78" width="350" height="48" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="900" y="90" width="18" height="24" rx="6" fill="#EEF2FF"/>
  <text x="909" y="106" text-anchor="middle" fill="#4338CA" font-size="12" font-family="Arial, sans-serif">≡</text>
  <text x="924" y="108" fill="#111827" font-size="14" font-weight="700" font-family="Arial, sans-serif">AI Assistant</text>
  <rect x="1100" y="90" width="128" height="24" rx="12" fill="#E8F5E9"/>
  <text x="1164" y="106" text-anchor="middle" fill="#1B5E20" font-size="11" font-family="Arial, sans-serif">Capture Mode</text>

  <!-- Collapsible sessions rail -->
  <rect x="900" y="132" width="68" height="402" rx="10" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="934" y="149" text-anchor="middle" fill="#64748B" font-size="9" font-family="Arial, sans-serif">SESSIONS</text>
  <rect x="906" y="156" width="56" height="20" rx="6" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="934" y="170" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="Arial, sans-serif">Find</text>
  <rect x="906" y="182" width="56" height="40" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="934" y="197" text-anchor="middle" fill="#1D4ED8" font-size="8" font-family="Arial, sans-serif">Checkout</text>
  <text x="934" y="210" text-anchor="middle" fill="#64748B" font-size="8" font-family="Arial, sans-serif">6 msgs</text>
  <rect x="960" y="314" width="6" height="64" rx="3" fill="#E2E8F0"/>
  <text x="963" y="350" text-anchor="middle" fill="#64748B" font-size="9" font-family="Arial, sans-serif">◀</text>

  <!-- Capture workspace -->
  <text x="980" y="146" fill="#6B7280" font-size="10" font-family="Arial, sans-serif">Context Capture Tools</text>
  <rect x="980" y="154" width="84" height="22" rx="11" fill="#EEF2FF"/>
  <text x="1022" y="168" text-anchor="middle" fill="#4338CA" font-size="10" font-family="Arial, sans-serif">/screenshot</text>
  <rect x="1070" y="154" width="96" height="22" rx="11" fill="#FCE7F3"/>
  <text x="1118" y="168" text-anchor="middle" fill="#9D174D" font-size="10" font-family="Arial, sans-serif">/select-element</text>

  <rect x="980" y="184" width="250" height="230" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="1105" y="252" text-anchor="middle" fill="#1D4ED8" font-size="14" font-family="Arial, sans-serif">Drop image or screenshot</text>
  <text x="1105" y="274" text-anchor="middle" fill="#64748B" font-size="11" font-family="Arial, sans-serif">Paste also supported (Ctrl/Cmd + V)</text>
  <rect x="992" y="292" width="110" height="28" rx="6" fill="#2563EB"/>
  <text x="1047" y="310" text-anchor="middle" fill="#FFFFFF" font-size="11" font-family="Arial, sans-serif">Capture Tab</text>
  <rect x="1110" y="292" width="110" height="28" rx="6" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="1165" y="310" text-anchor="middle" fill="#374151" font-size="11" font-family="Arial, sans-serif">Pick Element</text>

  <text x="980" y="434" fill="#6B7280" font-size="10" font-family="Arial, sans-serif">Attached context</text>
  <rect x="980" y="440" width="72" height="22" rx="11" fill="#DBEAFE"/>
  <text x="1016" y="454" text-anchor="middle" fill="#1D4ED8" font-size="10" font-family="Arial, sans-serif">URL x</text>
  <rect x="1058" y="440" width="94" height="22" rx="11" fill="#FEF3C7"/>
  <text x="1105" y="454" text-anchor="middle" fill="#92400E" font-size="10" font-family="Arial, sans-serif">Screenshot x</text>
  <rect x="1158" y="440" width="72" height="22" rx="11" fill="#FCE7F3"/>
  <text x="1194" y="454" text-anchor="middle" fill="#9D174D" font-size="10" font-family="Arial, sans-serif">Elem x</text>

  <!-- Composer -->
  <rect x="980" y="468" width="250" height="64" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="990" y="488" fill="#9CA3AF" font-size="10" font-family="Arial, sans-serif">Enter message with context...</text>
  <rect x="990" y="494" width="190" height="30" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="1000" y="513" fill="#64748B" font-size="10" font-family="Arial, sans-serif">Drop or type here...</text>
  <rect x="1186" y="494" width="36" height="30" rx="8" fill="#2563EB"/>
  <text x="1204" y="513" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="Arial, sans-serif">^</text>
  <text x="990" y="548" fill="#6B7280" font-size="10" font-family="Arial, sans-serif">Enter = Send · Shift+Enter = New line</text>
</svg>

<svg width="900" height="560" viewBox="0 0 900 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="560" fill="#F9FAFB"/>
  <text x="16" y="22" font-size="13" fill="#374151" font-weight="600" font-family="system-ui,sans-serif">Wireframe: Context Capture — Drag-and-Drop + One-Click Screenshot</text>

  <!-- Card container -->
  <rect x="16" y="36" width="868" height="508" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Section heading -->
  <text x="36" y="70" fill="#111827" font-size="15" font-weight="700" font-family="system-ui,sans-serif">Attach Context</text>
  <text x="36" y="90" fill="#6B7280" font-size="12" font-family="system-ui,sans-serif">Add context from the current page before sending to AI</text>

  <!-- Quick capture toolbar -->
  <rect x="36" y="104" width="828" height="48" rx="8" fill="#F3F4F6"/>
  <text x="52" y="120" fill="#6B7280" font-size="10" font-weight="600" font-family="system-ui,sans-serif">QUICK CAPTURE</text>

  <rect x="44" y="124" width="188" height="22" rx="5" fill="#1D4ED8"/>
  <text x="138" y="139" fill="white" font-size="11" text-anchor="middle" font-weight="600" font-family="system-ui,sans-serif">📷 Capture Current Tab</text>

  <rect x="240" y="124" width="148" height="22" rx="5" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="314" y="139" fill="#374151" font-size="11" text-anchor="middle" font-family="system-ui,sans-serif">⬡ Pick Element</text>

  <rect x="396" y="124" width="128" height="22" rx="5" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="460" y="139" fill="#374151" font-size="11" text-anchor="middle" font-family="system-ui,sans-serif">🔗 Current URL</text>

  <rect x="532" y="124" width="148" height="22" rx="5" fill="white" stroke="#D1D5DB" stroke-width="1"/>
  <text x="606" y="139" fill="#374151" font-size="11" text-anchor="middle" font-family="system-ui,sans-serif">📋 Page Selection</text>

  <!-- Drag and drop zone -->
  <rect x="36" y="164" width="828" height="200" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" stroke-dasharray="7 4"/>

  <text x="450" y="236" fill="#BFDBFE" font-size="56" text-anchor="middle" font-family="system-ui,sans-serif">⬆</text>
  <text x="450" y="294" fill="#1D4ED8" font-size="16" text-anchor="middle" font-weight="600" font-family="system-ui,sans-serif">Drag and drop image or screenshot here</text>
  <text x="450" y="318" fill="#6B7280" font-size="12" text-anchor="middle" font-family="system-ui,sans-serif">or paste from clipboard  (Ctrl+V / Cmd+V)</text>
  <text x="450" y="344" fill="#93C5FD" font-size="11" text-anchor="middle" font-family="system-ui,sans-serif">PNG · JPG · WebP · GIF supported</text>

  <!-- Hover state annotation -->
  <rect x="692" y="172" width="164" height="28" rx="4" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1" stroke-dasharray="3"/>
  <text x="774" y="190" fill="#3B82F6" font-size="10" text-anchor="middle" font-family="system-ui,sans-serif">highlight on drag-over</text>

  <!-- Attached chips section -->
  <text x="36" y="390" fill="#374151" font-size="11" font-weight="600" font-family="system-ui,sans-serif">ATTACHED  (3 items)</text>

  <rect x="36" y="400" width="158" height="30" rx="15" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="52" y="419" fill="#1D4ED8" font-size="11" font-family="system-ui,sans-serif">🔗 example.com/checkout  ×</text>

  <rect x="202" y="400" width="162" height="30" rx="15" fill="#FEF9C3" stroke="#FDE68A" stroke-width="1"/>
  <rect x="210" y="408" width="18" height="14" rx="3" fill="#F59E0B" opacity="0.5"/>
  <text x="236" y="419" fill="#92400E" font-size="11" font-family="system-ui,sans-serif">📷 tab-capture.png  ×</text>

  <rect x="372" y="400" width="156" height="30" rx="15" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
  <text x="388" y="419" fill="#9D174D" font-size="11" font-family="system-ui,sans-serif">⬡ button#checkout  ×</text>

  <rect x="536" y="400" width="84" height="30" rx="15" fill="white" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="3"/>
  <text x="578" y="419" fill="#9CA3AF" font-size="11" text-anchor="middle" font-family="system-ui,sans-serif">+ Add</text>

  <!-- Responsive note -->
  <rect x="700" y="396" width="192" height="38" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="714" y="412" fill="#92400E" font-size="10" font-family="system-ui,sans-serif">Responsive: chips wrap to</text>
  <text x="714" y="426" fill="#92400E" font-size="10" font-family="system-ui,sans-serif">multiple rows on narrow panels</text>

  <!-- Text input row -->
  <rect x="36" y="444" width="772" height="48" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="52" y="472" fill="#9CA3AF" font-size="12" font-family="system-ui,sans-serif">What would you like to analyse or ask about this context?</text>

  <rect x="820" y="444" width="64" height="48" rx="8" fill="#3B82F6"/>
  <text x="852" y="473" fill="white" font-size="24" text-anchor="middle" font-family="system-ui,sans-serif">↑</text>
</svg>

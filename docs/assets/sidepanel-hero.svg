  <text x="1208" y="317" text-anchor="end" fill="#60A5FA" font-size="10" font-family="Arial, sans-serif">AI</text>

  <rect x="912" y="336" width="214" height="42" rx="14" fill="#FFFFFF"/>
  <text x="924" y="360" fill="#374151" font-size="11" font-family="Arial, sans-serif">Run /test-feature checkout button</text>

  <rect x="1002" y="390" width="216" height="56" rx="14" fill="#DCEBFF"/>
  <text x="1014" y="412" fill="#1E3A8A" font-size="11" font-family="Arial, sans-serif">Done. Pass 2, Partial 1, Fail 1.</text>
  <text x="1014" y="428" fill="#1E3A8A" font-size="11" font-family="Arial, sans-serif">Want an exportable QA summary?</text>

  <!-- Context chips -->
  <rect x="904" y="550" width="92" height="22" rx="11" fill="#DBEAFE"/><text x="950" y="564" text-anchor="middle" fill="#1D4ED8" font-size="10" font-family="Arial, sans-serif">URL ×</text>
  <rect x="1002" y="550" width="110" height="22" rx="11" fill="#FEF3C7"/><text x="1057" y="564" text-anchor="middle" fill="#92400E" font-size="10" font-family="Arial, sans-serif">Screenshot ×</text>
  <rect x="1118" y="550" width="110" height="22" rx="11" fill="#FCE7F3"/><text x="1173" y="564" text-anchor="middle" fill="#9D174D" font-size="10" font-family="Arial, sans-serif">Element ×</text>

  <!-- Input area -->
  <rect x="900" y="580" width="330" height="90" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="912" y="602" fill="#9CA3AF" font-size="10" font-family="Arial, sans-serif">Drop image here or use /screenshot</text>
  <rect x="912" y="610" width="248" height="46" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="922" y="637" fill="#6B7280" font-size="11" font-family="Arial, sans-serif">Message AI about this page context...</text>
  <rect x="1168" y="610" width="52" height="46" rx="8" fill="#2563EB"/>
  <text x="1194" y="638" text-anchor="middle" fill="#FFFFFF" font-size="20" font-family="Arial, sans-serif">↑</text>
  <text x="912" y="664" fill="#6B7280" font-size="10" font-family="Arial, sans-serif">Enter = Send  ·  Shift+Enter = New line</text>
</svg>

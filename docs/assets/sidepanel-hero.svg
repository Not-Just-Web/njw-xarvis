  <text x="1188" y="106" text-anchor="middle" fill="#1D4ED8" font-size="11" font-family="Arial, sans-serif">New Chat</text>

  <!-- Skill chips -->
  <text x="904" y="146" fill="#6B7280" font-size="10" font-family="Arial, sans-serif">Default Skills</text>
  <rect x="904" y="152" width="82" height="22" rx="11" fill="#EEF2FF"/><text x="945" y="166" text-anchor="middle" fill="#4338CA" font-size="10" font-family="Arial, sans-serif">/screenshot</text>
  <rect x="992" y="152" width="96" height="22" rx="11" fill="#FCE7F3"/><text x="1040" y="166" text-anchor="middle" fill="#9D174D" font-size="10" font-family="Arial, sans-serif">/select-element</text>
  <rect x="1092" y="152" width="78" height="22" rx="11" fill="#ECFDF5"/><text x="1131" y="166" text-anchor="middle" fill="#047857" font-size="10" font-family="Arial, sans-serif">/test-section</text>
  <rect x="1174" y="152" width="62" height="22" rx="11" fill="#FFF7ED"/><text x="1205" y="166" text-anchor="middle" fill="#C2410C" font-size="10" font-family="Arial, sans-serif">/test-feature</text>

  <!-- Chat background area -->
  <rect x="900" y="182" width="330" height="360" rx="10" fill="#ECEFF3"/>


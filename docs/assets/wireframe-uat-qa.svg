<svg width="1040" height="660" viewBox="0 0 1040 660" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1040" height="660" fill="#F9FAFB"/>
  <text x="16" y="22" font-size="13" fill="#374151" font-weight="600" font-family="system-ui,sans-serif">Wireframe: UAT / QA Assist Mode</text>

  <!-- Container -->
  <rect x="16" y="36" width="1008" height="608" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Mode toggle bar -->
  <rect x="16" y="36" width="1008" height="50" rx="12" fill="#1F2937"/>
  <rect x="32" y="47" width="116" height="28" rx="6" fill="#374151"/>
  <text x="90" y="66" fill="#9CA3AF" font-size="12" text-anchor="middle" font-family="system-ui,sans-serif">💬 Chat</text>
  <rect x="156" y="47" width="148" height="28" rx="6" fill="#7C3AED"/>
  <text x="230" y="66" fill="white" font-size="12" text-anchor="middle" font-weight="600" font-family="system-ui,sans-serif">🔬 UAT / QA  ●</text>
  <text x="340" y="66" fill="#9CA3AF" font-size="11" font-family="system-ui,sans-serif">Describe a feature or acceptance criteria — AI verifies against attached context</text>

  <!-- Test criteria -->
  <text x="36" y="112" fill="#111827" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Test Criteria / Feature Description</text>
  <rect x="36" y="120" width="968" height="88" rx="8" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="1"/>
  <text x="52" y="144" fill="#374151" font-size="12" font-family="system-ui,sans-serif">Verify that the checkout page has:</text>
  <text x="52" y="162" fill="#374151" font-size="12" font-family="system-ui,sans-serif">1. A visible "Place Order" button with correct label</text>
  <text x="52" y="180" fill="#374151" font-size="12" font-family="system-ui,sans-serif">2. Proper inline field error messages visible for invalid inputs</text>
  <text x="52" y="198" fill="#374151" font-size="12" font-family="system-ui,sans-serif">3. The submit button is accessible (has aria-label or meaningful text)</text>

  <!-- Attached context -->
  <text x="36" y="232" fill="#111827" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Attached Context  (3 items)</text>
  <rect x="36" y="240" width="968" height="52" rx="8" fill="#F3F4F6"/>
  <rect x="48" y="250" width="148" height="26" rx="13" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="64" y="267" fill="#1D4ED8" font-size="11" font-family="system-ui,sans-serif">🔗 /checkout  URL</text>
  <rect x="204" y="250" width="148" height="26" rx="13" fill="#FEF9C3" stroke="#FDE68A" stroke-width="1"/>
  <text x="220" y="267" fill="#92400E" font-size="11" font-family="system-ui,sans-serif">📷 Full Screenshot</text>
  <rect x="360" y="250" width="168" height="26" rx="13" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
  <text x="376" y="267" fill="#9D174D" font-size="11" font-family="system-ui,sans-serif">⬡ button#place-order</text>

  <!-- Run button -->
  <rect x="840" y="248" width="152" height="32" rx="6" fill="#7C3AED"/>
  <text x="916" y="268" fill="white" font-size="12" text-anchor="middle" font-weight="600" font-family="system-ui,sans-serif">▶ Run UAT Check</text>

  <!-- Report heading -->
  <text x="36" y="320" fill="#111827" font-size="13" font-weight="600" font-family="system-ui,sans-serif">AI Verification Report</text>
  <text x="36" y="336" fill="#6B7280" font-size="11" font-family="system-ui,sans-serif">Gemini Flash · analysed 3 context items · 1.2s</text>

  <rect x="36" y="348" width="968" height="272" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Check 1: Pass -->
  <rect x="52" y="364" width="940" height="56" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <rect x="52" y="364" width="6" height="56" rx="3" fill="#10B981"/>
  <text x="70" y="384" fill="#15803D" font-size="12" font-weight="600" font-family="system-ui,sans-serif">✓  PASS — "Place Order" button found and visible</text>
  <text x="70" y="402" fill="#166534" font-size="11" font-family="system-ui,sans-serif">Button element located: button#place-order with text "Place Order". Rendered, enabled, and in viewport.</text>

  <!-- Check 2: Warning -->
  <rect x="52" y="428" width="940" height="68" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <rect x="52" y="428" width="6" height="68" rx="3" fill="#F59E0B"/>
  <text x="70" y="448" fill="#92400E" font-size="12" font-weight="600" font-family="system-ui,sans-serif">⚠  PARTIAL — Form error messages present but inconsistent</text>
  <text x="70" y="466" fill="#B45309" font-size="11" font-family="system-ui,sans-serif">3 of 4 fields show inline errors. Postcode field shows generic "Invalid format" instead of</text>
  <text x="70" y="482" fill="#B45309" font-size="11" font-family="system-ui,sans-serif">specific guidance like "Enter a valid UK postcode (e.g. SW1A 1AA)".</text>

  <!-- Check 3: Fail -->
  <rect x="52" y="504" width="940" height="68" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <rect x="52" y="504" width="6" height="68" rx="3" fill="#EF4444"/>
  <text x="70" y="524" fill="#B91C1C" font-size="12" font-weight="600" font-family="system-ui,sans-serif">✗  FAIL — Button missing aria-label attribute</text>
  <text x="70" y="542" fill="#991B1B" font-size="11" font-family="system-ui,sans-serif">button#place-order has no aria-label. Screen readers rely on visible text only.</text>
  <text x="70" y="558" fill="#991B1B" font-size="11" font-family="system-ui,sans-serif">Recommendation: add  aria-label="Place your order"  or  aria-describedby  pointing to order summary.</text>

  <!-- Summary bar -->
  <rect x="36" y="628" width="968" height="8" rx="4" fill="#F3F4F6"/>
  <rect x="36" y="628" width="323" height="8" rx="4" fill="#10B981"/>
  <rect x="359" y="628" width="323" height="8" rx="4" fill="#F59E0B"/>
  <rect x="682" y="628" width="322" height="8" rx="4" fill="#EF4444"/>
  <text x="36" y="652" fill="#15803D" font-size="11" font-family="system-ui,sans-serif">1 Pass</text>
  <text x="200" y="652" fill="#B45309" font-size="11" font-family="system-ui,sans-serif">1 Partial</text>
  <text x="364" y="652" fill="#B91C1C" font-size="11" font-family="system-ui,sans-serif">1 Fail</text>
  <text x="1004" y="652" fill="#6B7280" font-size="11" text-anchor="end" font-family="system-ui,sans-serif">Export report ↓</text>
</svg>

  <text x="990" y="240" fill="#64748B" font-size="10" font-family="Arial, sans-serif">2. Errors readable 3. Accessible button</text>

  <rect x="980" y="268" width="72" height="22" rx="11" fill="#DBEAFE"/>
  <text x="1016" y="282" text-anchor="middle" fill="#1D4ED8" font-size="10" font-family="Arial, sans-serif">URL x</text>
  <rect x="1058" y="268" width="94" height="22" rx="11" fill="#FEF3C7"/>
  <text x="1105" y="282" text-anchor="middle" fill="#92400E" font-size="10" font-family="Arial, sans-serif">Screenshot x</text>
  <rect x="1158" y="268" width="72" height="22" rx="11" fill="#FCE7F3"/>
  <text x="1194" y="282" text-anchor="middle" fill="#9D174D" font-size="10" font-family="Arial, sans-serif">Elem x</text>

  <rect x="980" y="298" width="250" height="192" rx="10" fill="#ECEFF3"/>
  <rect x="988" y="308" width="234" height="48" rx="8" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="998" y="326" fill="#15803D" font-size="10" font-family="Arial, sans-serif">PASS: Place Order button visible and enabled.</text>
  <text x="998" y="342" fill="#166534" font-size="10" font-family="Arial, sans-serif">Element found and in viewport.</text>

  <rect x="988" y="364" width="234" height="52" rx="8" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="998" y="382" fill="#92400E" font-size="10" font-family="Arial, sans-serif">PARTIAL: Inline errors exist, but postcode</text>
  <text x="998" y="398" fill="#B45309" font-size="10" font-family="Arial, sans-serif">message is generic and not actionable.</text>

  <rect x="988" y="424" width="234" height="56" rx="8" fill="#FEF2F2" stroke="#FECACA"/>
  <text x="998" y="442" fill="#B91C1C" font-size="10" font-family="Arial, sans-serif">FAIL: button missing aria-label attribute.</text>
  <text x="998" y="458" fill="#991B1B" font-size="10" font-family="Arial, sans-serif">Recommendation generated for fix.</text>

  <!-- Composer -->
  <rect x="980" y="500" width="250" height="64" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="990" y="520" fill="#9CA3AF" font-size="10" font-family="Arial, sans-serif">Ask AI to export or rerun tests...</text>
  <rect x="990" y="526" width="190" height="30" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="1000" y="545" fill="#64748B" font-size="10" font-family="Arial, sans-serif">/test-feature checkout</text>
  <rect x="1186" y="526" width="36" height="30" rx="8" fill="#2563EB"/>
  <text x="1204" y="545" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="Arial, sans-serif">^</text>
  <text x="990" y="580" fill="#6B7280" font-size="10" font-family="Arial, sans-serif">Enter = Send · Shift+Enter = New line</text>
</svg>

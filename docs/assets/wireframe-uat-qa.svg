  <rect x="906" y="156" width="56" height="20" rx="6" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="934" y="170" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="Arial, sans-serif">Find</text>
  <rect x="906" y="182" width="56" height="40" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
